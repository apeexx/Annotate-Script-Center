<!--
页面板块: action-buttons
真实定位:
- button.label-center-task-link
说明:
- 首页主要行内动作按钮包括“标注”“释放”“领取”。
- 这些按钮都会触发业务动作或页面跳转，采集和默认脚本初始化时不要点击。
-->
<div data-action-buttons="labeling-task-home">
  <button type="button" class="ant-v5-btn ant-v5-btn-link ant-v5-btn-color-primary ant-v5-btn-variant-link ant-v5-btn-sm label-center-task-link">
    <span>标注</span>
  </button>
  <button type="button" class="ant-v5-btn ant-v5-btn-link ant-v5-btn-color-primary ant-v5-btn-variant-link ant-v5-btn-sm label-center-task-link">
    <span>释放</span>
  </button>
  <button type="button" class="ant-v5-btn ant-v5-btn-link ant-v5-btn-color-primary ant-v5-btn-variant-link ant-v5-btn-sm label-center-task-link">
    <span>领取</span>
  </button>
</div>
