<!--
页面板块: available-task-row
真实定位:
- .all-task-list-container .ant-v5-table-tbody .ant-v5-table-row
用途:
- 可领取任务表格的一行。行内按钮文本为“领取”。
-->
<tr class="ant-v5-table-row ant-v5-table-row-level-0">
  <td class="ant-v5-table-cell"><span>任务名称：REDACTED_TASK_NAME</span></td>
  <td class="ant-v5-table-cell"><span>任务ID：REDACTED_TASK_ID</span></td>
  <td class="ant-v5-table-cell">
    <div class="ant-v5-spin ant-v5-spin-sm ant-v5-spin-spinning" aria-live="polite" aria-busy="true">
      <span class="ant-v5-spin-dot-holder"><span class="ant-v5-spin-dot ant-v5-spin-dot-spin"></span></span>
    </div>
  </td>
  <td class="ant-v5-table-cell">
    <div>
      <button type="button" class="ant-v5-btn ant-v5-btn-link ant-v5-btn-color-primary ant-v5-btn-variant-link ant-v5-btn-sm label-center-task-link">
        <span>领取</span>
      </button>
    </div>
  </td>
</tr>
