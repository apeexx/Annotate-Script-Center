<!--
页面板块: action-buttons
真实定位:
- .mark-toolbox-submit-button
说明:
- 当前页只有自动领取开关和提交按钮，没有独立保存按钮。
-->
<div class="mark-toolbox-submit-button">
  <span>
    <span>自动领取</span>
    <span role="img" class="anticon"></span>
    <button type="button" role="switch" aria-checked="true" class="ant-v5-switch ant-v5-switch-checked">
      <div class="ant-v5-switch-handle"></div>
      <span class="ant-v5-switch-inner">
        <span class="ant-v5-switch-inner-checked"></span>
        <span class="ant-v5-switch-inner-unchecked"></span>
      </span>
    </button>
  </span>
  <div class="ant-v5-space-compact ant-v5-space-compact-block ant-v5-dropdown-button">
    <button type="button" class="ant-v5-btn ant-v5-btn-default ant-v5-btn-color-default ant-v5-btn-variant-outlined ant-v5-btn-compact-item ant-v5-btn-compact-first-item">
      <span>提交任务</span>
    </button>
    <button type="button" class="ant-v5-btn ant-v5-btn-default ant-v5-btn-color-default ant-v5-btn-variant-outlined ant-v5-btn-icon-only ant-v5-btn-compact-item ant-v5-btn-compact-last-item ant-v5-dropdown-trigger">
      <span class="ant-v5-btn-icon">
        <span role="img" aria-label="down" class="anticon anticon-down"></span>
      </span>
    </button>
  </div>
</div>
