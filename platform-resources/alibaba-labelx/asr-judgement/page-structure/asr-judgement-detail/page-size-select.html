<!--
页面板块: page-size-select
真实定位:
- .ant-v5-pagination-options-size-changer
说明:
- 详情页分页右侧的每页条数选择器。
- 选择后会触发 data / summary / board 重新请求。
-->
<div class="ant-v5-pagination-options">
  <div class="ant-v5-select ant-v5-pagination-options-size-changer ant-v5-select-single ant-v5-select-show-arrow ant-v5-select-show-search">
    <div class="ant-v5-select-selector">
      <span class="ant-v5-select-selection-wrap">
        <span class="ant-v5-select-selection-search">
          <input type="search" role="combobox" aria-label="页码" aria-expanded="false" aria-haspopup="listbox" class="ant-v5-select-selection-search-input" />
        </span>
        <span class="ant-v5-select-selection-item" title="10 条/页">10 条/页</span>
      </span>
    </div>
  </div>
</div>

<div class="ant-v5-select-dropdown">
  <div class="rc-virtual-list">
    <div class="rc-virtual-list-holder">
      <div class="rc-virtual-list-holder-inner" role="listbox">
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="1 条/页">
          <div class="ant-v5-select-item-option-content">1 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="2 条/页">
          <div class="ant-v5-select-item-option-content">2 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="3 条/页">
          <div class="ant-v5-select-item-option-content">3 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="4 条/页">
          <div class="ant-v5-select-item-option-content">4 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="5 条/页">
          <div class="ant-v5-select-item-option-content">5 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option ant-v5-select-item-option-selected" title="10 条/页">
          <div class="ant-v5-select-item-option-content">10 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="20 条/页">
          <div class="ant-v5-select-item-option-content">20 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="30 条/页">
          <div class="ant-v5-select-item-option-content">30 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="40 条/页">
          <div class="ant-v5-select-item-option-content">40 条/页</div>
        </div>
        <div role="option" class="ant-v5-select-item ant-v5-select-item-option" title="50 条/页">
          <div class="ant-v5-select-item-option-content">50 条/页</div>
        </div>
      </div>
    </div>
  </div>
</div>
