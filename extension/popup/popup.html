<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>标注脚本中心</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        margin: 0;
        min-width: 376px;
        background:
          radial-gradient(circle at top left, rgba(22, 119, 255, 0.12), transparent 32%),
          linear-gradient(160deg, rgba(16, 185, 129, 0.12), rgba(14, 165, 233, 0.08)),
          #f8fafc;
        color: #0f172a;
      }

      .shell {
        padding: 16px;
      }

      .panel {
        display: grid;
        gap: 14px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 20px;
        padding: 18px;
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
      }

      .head {
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(88px, 1fr);
        align-items: start;
        gap: 12px;
      }

      .brand-title {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-logo {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        flex: 0 0 auto;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
      }

      h1,
      h2 {
        margin: 0;
      }

      h1 {
        font-size: 22px;
        line-height: 1.2;
      }

      .stage {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(22, 119, 255, 0.1);
        color: #0f5bd8;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .stage-link {
        border: none;
        cursor: pointer;
        width: 100%;
        justify-content: center;
      }

      .status-card {
        display: grid;
        gap: 10px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(241, 245, 249, 0.9);
      }

      .status-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .status-copy strong {
        display: block;
        margin-bottom: 4px;
        font-size: 14px;
      }

      .status-copy span {
        color: #64748b;
        font-size: 12px;
        line-height: 1.6;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .pill.success {
        background: rgba(16, 185, 129, 0.14);
        color: #047857;
      }

      .pill.error {
        background: rgba(239, 68, 68, 0.14);
        color: #b91c1c;
      }

      .pill.disabled {
        background: rgba(239, 68, 68, 0.14);
        color: #b91c1c;
      }

      .pill.pending {
        background: rgba(148, 163, 184, 0.16);
        color: #475569;
      }

      .pill.info {
        background: rgba(22, 119, 255, 0.1);
        color: #0f5bd8;
      }

      .pill-toggle {
        width: auto;
        min-width: 86px;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 14px;
        border: 1px solid transparent;
      }

      .pill-toggle.enabled {
        background: rgba(245, 158, 11, 0.18);
        color: #b45309;
      }

      .pill-toggle.disabled {
        background: rgba(239, 68, 68, 0.12);
        color: #b91c1c;
      }

      .pill-toggle.pending {
        background: rgba(148, 163, 184, 0.16);
        color: #475569;
      }

      .helper {
        min-height: 0;
        color: #475569;
        font-size: 12px;
        line-height: 1.5;
      }

      .actions {
        display: grid;
        gap: 8px;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 12px;
        padding: 11px 14px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.16s ease, background 0.16s ease, opacity 0.16s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .primary-button {
        background: linear-gradient(135deg, #1677ff, #0958d9);
        color: #ffffff;
      }

      .secondary-button {
        background: #e2e8f0;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="head">
          <div>
            <div class="brand-title">
              <img class="brand-logo" src="../assets/brand/asc-logo.svg" alt="标注脚本中心" />
              <h1 id="extension-name">标注脚本中心</h1>
            </div>
          </div>
          <button id="stage-label" class="stage stage-link" type="button">脚本中心</button>
        </div>

        <section class="status-card">
          <div class="status-row">
            <div class="status-copy">
              <strong id="detected-title">正在检测当前页面...</strong>
              <span id="detected-description">请稍候。</span>
            </div>
            <button id="detected-status-pill" class="pill-toggle pending" type="button" disabled>检测中</button>
          </div>
        </section>

        <div class="actions">
          <button id="open-script-settings" class="primary-button" type="button" disabled>打开当前脚本设置</button>
        </div>

        <div id="popup-status" class="helper" aria-live="polite"></div>
      </section>
    </main>

    <script src="../shared/build-meta.js"></script>
    <script src="../shared/constants.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
